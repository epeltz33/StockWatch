<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - StockWatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary-50: #eff6ff;
      --color-primary-100: #dbeafe;
      --color-primary-500: #3b82f6;
      --color-primary-600: #2563eb;
      --color-primary-700: #1d4ed8;
      --color-gray-50: #f9fafb;
      --color-gray-100: #f3f4f6;
      --color-gray-200: #e5e7eb;
      --color-gray-300: #d1d5db;
      --color-gray-400: #9ca3af;
      --color-gray-500: #6b7280;
      --color-gray-600: #4b5563;
      --color-gray-700: #374151;
      --color-gray-800: #1f2937;
      --color-gray-900: #111827;
      --color-danger-50: #fef2f2;
      --color-danger-100: #fee2e2;
      --color-danger-600: #dc2626;
      --color-danger-700: #b91c1c;
      --font-family-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-family-sans);
      line-height: 1.6;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #6B8DD6 100%);
      color: var(--color-gray-900);
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
    }

    .auth-card {
      background: white;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
    }

    .auth-header {
      text-align: center;
      padding: 2.5rem 2rem 1.5rem;
      background: linear-gradient(135deg, var(--color-primary-600) 0%, var(--color-primary-700) 100%);
    }

    .auth-logo {
      width: 56px;
      height: 56px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: var(--radius-lg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .auth-logo svg {
      width: 32px;
      height: 32px;
      fill: white;
    }

    .auth-header h1 {
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.25rem 0;
      letter-spacing: -0.025em;
    }

    .auth-header p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.875rem;
      margin: 0;
    }

    .auth-body {
      padding: 2rem;
    }

    .flashes {
      list-style-type: none;
      padding: 0;
      margin: 0 0 1.5rem 0;
    }

    .flashes li {
      background-color: var(--color-danger-50);
      border: 1px solid var(--color-danger-100);
      color: var(--color-danger-700);
      padding: 0.875rem 1rem;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-gray-700);
      margin-bottom: 0.5rem;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem;
      font-family: var(--font-family-sans);
      font-size: 1rem;
      color: var(--color-gray-900);
      background-color: white;
      border: 1px solid var(--color-gray-300);
      border-radius: var(--radius-md);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      appearance: none;
    }

    input[type="email"]:hover,
    input[type="password"]:hover,
    input[type="text"]:hover {
      border-color: var(--color-gray-400);
    }

    input[type="email"]:focus,
    input[type="password"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: var(--color-primary-500);
      box-shadow: 0 0 0 3px rgb(59 130 246 / 0.15);
    }

    input::placeholder {
      color: var(--color-gray-400);
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.875rem 1.5rem;
      font-family: var(--font-family-sans);
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--color-primary-600) 0%, var(--color-primary-700) 100%);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      margin-top: 0.5rem;
    }

    button[type="submit"]:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-lg), 0 4px 12px rgb(59 130 246 / 0.4);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    .auth-footer {
      text-align: center;
      padding: 1.5rem 2rem;
      background-color: var(--color-gray-50);
      border-top: 1px solid var(--color-gray-100);
    }

    .auth-footer p {
      color: var(--color-gray-600);
      font-size: 0.875rem;
      margin: 0;
    }

    .auth-footer a {
      color: var(--color-primary-600);
      font-weight: 500;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .auth-footer a:hover {
      color: var(--color-primary-700);
      text-decoration: underline;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.875rem;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .back-link:hover {
      color: white;
    }

    @media (max-width: 480px) {
      .auth-container {
        padding: 1rem;
      }

      .auth-header {
        padding: 2rem 1.5rem 1.25rem;
      }

      .auth-body {
        padding: 1.5rem;
      }

      .auth-footer {
        padding: 1.25rem 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 13h2v7H3v-7zm4-5h2v12H7V8zm4-5h2v17h-2V3zm4 8h2v9h-2v-9zm4-3h2v12h-2V8z"/>
          </svg>
        </div>
        <h1>Welcome back</h1>
        <p>Sign in to your StockWatch account</p>
      </div>

      <div class="auth-body">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <ul class="flashes">
          {% for message in messages %}
          <li>{{ message }}</li>
          {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}

        <form method="POST">
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" name="email" id="email" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Enter your password" required>
          </div>

          <button type="submit">Sign in</button>
        </form>
      </div>

      <div class="auth-footer">
        <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a></p>
      </div>
    </div>

    <a href="/" class="back-link">← Back to home</a>
  </div>
</body>

</html>
